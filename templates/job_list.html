
{% extends "base.html" %}
{% load static %}
{% block content %}
<body style="background-color: #0f172a;">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body { font-family: 'Inter', sans-serif; color: #e2e8f0; }
    
    .layui-fluid { padding: 24px; }
    
    /* 卡片容器 - 深色磨砂 */
    .layui-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    .layui-card-header {
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding: 20px 24px;
    }
    
    /* 表单元素重构 */
    .layui-form-label {
        color: #94a3b8;
        font-weight: 500;
    }
    
    .layui-input, .layui-select {
        background-color: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        border-radius: 8px;
        transition: all 0.3s;
    }
    
    .layui-input:focus, .layui-select:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    
    .layui-input::-webkit-input-placeholder { color: rgba(255, 255, 255, 0.3); }
    
    /* 搜索按钮 */
    .layui-btn {
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        border-radius: 8px;
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        border: none;
    }
    
    .layui-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
        opacity: 0.9;
    }
    
    /* 表格样式覆盖 */
    .layui-table-view {
        border: none !important;
        background-color: transparent !important;
    }
    
    .layui-table {
        background-color: transparent !important;
        color: #e2e8f0;
    }
    
    /* 修复表头背景 */
    .layui-table-header {
        background-color: #1e293b !important; /* 深色背景 */
        border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
    }
    
    .layui-table th {
        background-color: #1e293b !important; /* 强制表头单元格背景 */
        color: #94a3b8 !important; /* 浅灰文字 */
        font-weight: 600;
        border-color: rgba(255, 255, 255, 0.05) !important;
    }
    
    .layui-table th span {
        background-color: transparent !important;
        color: #94a3b8 !important;
    }
    
    .layui-table td {
        border-color: rgba(255, 255, 255, 0.05);
        color: #cbd5e1;
    }
    
    /* 斑马纹和悬停 */
    .layui-table-hover, .layui-table-click, .layui-table-hover td {
        background-color: rgba(59, 130, 246, 0.1) !important;
    }
    
    /* 分页样式修复 */
    .layui-laypage a, .layui-laypage span {
        background-color: transparent !important;
        color: #94a3b8 !important;
        border-color: rgba(255, 255, 255, 0.1) !important;
    }
    
    .layui-laypage .layui-laypage-curr .layui-laypage-em {
        background-color: #3b82f6 !important;
    }
    
    .layui-laypage .layui-laypage-curr em {
        color: #fff !important;
    }

    /* 分页输入框和下拉框深色适配 */
    .layui-laypage input, .layui-laypage select {
        background-color: #1e293b !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: #fff !important;
    }
    
    .layui-laypage button {
        background-color: #1e293b !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: #94a3b8 !important;
    }

    /* 修复底部空白 */
    html, body { height: 100%; }
    .layui-fluid { 
        padding: 24px; 
        min-height: calc(100vh - 110px); 
        box-sizing: border-box;
    }
    .layui-card { height: 100%; margin-bottom: 0; }
    .layui-card-body { height: calc(100% - 100px); overflow: auto; }

    /* 投递按钮特殊样式 */
    .layui-btn-sm {
        height: 26px;
        line-height: 26px;
        font-size: 12px;
        background: rgba(16, 185, 129, 0.15);
        color: #34d399;
        border: 1px solid rgba(16, 185, 129, 0.3);
        box-shadow: none;
    }
    
    .layui-btn-sm:hover {
        background: rgba(16, 185, 129, 0.25);
        color: #fff;
    }
    
    .layui-btn-normal {
        background: rgba(148, 163, 184, 0.15) !important;
        color: #94a3b8 !important;
        border: 1px solid rgba(148, 163, 184, 0.3) !important;
    }

    /* 修复下拉菜单样式 */
    .layui-form-select dl {
        background-color: #1e293b;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        padding: 5px 0;
    }
    
    .layui-form-select dl dd {
        color: rgba(255, 255, 255, 0.8);
    }
    
    .layui-form-select dl dd:hover {
        background-color: rgba(255, 255, 255, 0.05);
    }
    
    .layui-form-select dl dd.layui-this {
        background-color: #3b82f6;
        color: #fff;
    }

    /* 修复表格 Loading 和空数据样式 */
    .layui-table-init, .layui-none {
        background-color: transparent !important;
        color: #94a3b8 !important;
    }
    
    .layui-table-body {
        overflow-x: auto;
    }
  </style>

  <div class="layui-fluid">
    <div class="layui-card">
      <div class="layui-form layui-card-header layuiadmin-card-header-auto">
          <input type="hidden" id="keyword" autocomplete="off" class="layui-input" value="">
          <input type="hidden" id="price_min" autocomplete="off" class="layui-input" value="">
          <input type="hidden" id="price_max" autocomplete="off" class="layui-input" value="">
          <input type="hidden" id="edu" autocomplete="off" class="layui-input" value="">
          <input type="hidden" id="city" autocomplete="off" class="layui-input" value="">
        <div class="layui-form-item">
          <div class="layui-inline">
            <label class="layui-form-label">岗位名称</label>
            <div class="layui-input-inline">
              <input type="text" name="keyword" id="keyword_1" placeholder="输入职位关键字" autocomplete="off" class="layui-input">
            </div>
          </div>
          <div class="layui-inline">
            <label class="layui-form-label">薪资区间(K)</label>
            <div class="layui-input-inline" style="width: 100px;">
                <input type="text" name="price_min" id="price_min_1" placeholder="￥" autocomplete="off" class="layui-input" value="">
          </div>
          <div class="layui-form-mid" style="color: #94a3b8;">-</div>
          <div class="layui-input-inline" style="width: 100px;">
            <input type="text" name="price_max" id="price_max_1" placeholder="￥" autocomplete="off" class="layui-input" value="">
          </div>
          </div>
          <div class="layui-inline">
            <label class="layui-form-label">学历要求</label>
            <div class="layui-input-inline">
              <select name="edu" id="edu_1">
                <option value="">请选择学历</option>
                <option value="博士">博士</option>
                <option value="硕士">硕士</option>
                <option value="本科">本科</option>
                <option value="大专">大专</option>
                <option value="不限">经验不限</option>
              </select>
            </div>
          </div>
          <div class="layui-inline">
            <label class="layui-form-label">工作地点</label>
            <div class="layui-input-inline">
              <select name="city" id="city_1">
                <option value="">请选择城市</option>
                <option value="北京">北京</option>
                <option value="上海">上海</option>
                <option value="天津">天津</option>
                <option value="重庆">重庆</option>
                <option value="广州">广州</option>
                <option value="深圳">深圳</option>
                <option value="苏州">苏州</option>
                <option value="南京">南京</option>
                <option value="杭州">杭州</option>
                <option value="大连">大连</option>
                <option value="成都">成都</option>
                <option value="武汉">武汉</option>
                <option value="西安">西安</option>
              </select>
            </div>
          </div>
          <div class="layui-inline">
            <button class="layui-btn layuiadmin-btn-list" lay-submit lay-filter="LAY-app-forumlist-search">
              <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="layui-card-body">
          <table id="LAY-app-forum-list" lay-filter="LAY-app-forum-list"></table>
          {% verbatim %}
            <script type="text/html" id="table-forum-list">
               {{#  if(d.send_key == 0){ }}
              <a class="layui-btn layui-btn-sm" lay-event="send"><i class="layui-icon layui-icon-add-circle-fine"></i> 投递</a>
               {{#  } else { }}
              <a class="layui-btn layui-btn-sm layui-btn-normal" lay-event="send_1">已 投 递</a>
               {{#  } }}
            </script>
          {% endverbatim %}
      </div>
    </div>
  </div>
  </body>
{% endblock %}

{% block js %}
  <script>
  layui.config({
    base: '{% static "layuiadmin/" %}' //静态资源所在路径
  }).extend({
    index: 'lib/index' //主入口模块
  }).use(['index', 'forum', 'table'], function() {
      var $ = layui.$
          , form = layui.form
          , table = layui.table;

      //监听搜索
      form.on('submit(LAY-app-forumlist-search)', function (data) {
          var field = data.field;
          console.log(notNumber(field.price_min))
          console.log(field.price_min == "")
          if(field.price_min != ""){
              if(notNumber(field.price_min)){
                  console.log(field.price_min)
              layer.msg("薪资区间应为数字！");
              return false
              }
          }
          if(field.price_max != ""){
              if(notNumber(field.price_max)){
                  console.log(field.price_max)
              layer.msg("薪资区间应为数字！");
              return false
              }
          }


          //执行重载
          table.reload('LAY-app-forum-list', {
              page:{curr:1},
              where: field
          });
      });
  });

  function notNumber(val) {
    var regPos = /^\d+(\.\d+)?$/; //非负浮点数
    var regNeg = /^(-(([0-9]+\.[0-9]*[1-9][0-9]*)|([0-9]*[1-9][0-9]*\.[0-9]+)|([0-9]*[1-9][0-9]*)))$/; //负浮点数
    if(regPos.test(val) || regNeg.test(val)) {
        return false;
        } else {
        return true;
        }
    }
  </script>
{% endblock %}
