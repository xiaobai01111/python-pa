
{% extends "base.html" %}
{% load static %}
{% block content %}
<body>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body { font-family: 'Inter', sans-serif; color: oklch(var(--bc)); }
    
    .layui-fluid { padding: 24px; }
    
    /* 卡片容器 - 适配所有主题 */
    .layui-card {
        background-color: oklch(var(--b2) / 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        border: 1px solid oklch(var(--bc) / 0.1);
        color: oklch(var(--bc));
    }
    
    .layui-card-header {
        border-bottom: 1px solid oklch(var(--bc) / 0.1);
        padding: 20px 24px;
        color: oklch(var(--bc));
    }
    
    /* ========================================
       daisyUI 风格表单元素
       ======================================== */
    
    /* 表单项布局 - 防止换行 */
    .layui-form-item {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 16px;
    }
    
    .layui-inline {
        display: inline-flex;
        align-items: center;
        white-space: nowrap;
    }
    
    /* 标签样式 - daisyUI label */
    .layui-form-label {
        color: oklch(var(--bc) / 0.7);
        font-weight: 500;
        font-size: 14px;
        white-space: nowrap;
        padding: 0 12px 0 0;
        width: auto;
    }
    
    /* 输入框 - daisyUI input */
    .layui-input, .layui-select {
        background-color: oklch(var(--b1));
        border: 1px solid oklch(var(--bc) / 0.2);
        color: oklch(var(--bc));
        border-radius: 8px;
        transition: all 0.2s;
        height: 40px;
        padding: 0 12px;
    }
    
    .layui-input:focus, .layui-select:focus {
        border-color: oklch(var(--p));
        box-shadow: 0 0 0 2px oklch(var(--p) / 0.25);
        outline: none;
    }
    
    .layui-input::-webkit-input-placeholder { color: oklch(var(--bc) / 0.4); }
    
    /* 下拉框容器 */
    .layui-input-inline {
        display: inline-block;
    }
    
    /* 搜索按钮 - daisyUI btn-primary */
    .layui-btn {
        background-color: oklch(var(--p));
        color: oklch(var(--pc));
        border-radius: 8px;
        border: none;
        height: 40px;
        min-height: 40px;
        padding: 0 16px;
        font-weight: 500;
        transition: all 0.2s;
    }
    
    .layui-btn:hover {
        background-color: oklch(var(--p) / 0.8);
    }
    
    .layui-btn:active {
        transform: scale(0.98);
    }
    
    /* 表格样式覆盖 */
    .layui-table-view {
        border: none !important;
        background-color: transparent !important;
    }
    
    .layui-table {
        background-color: transparent !important;
        color: oklch(var(--bc));
    }
    
    /* 修复表头背景 */
    .layui-table-header {
        background-color: oklch(var(--b3)) !important; /* base-300 */
        border-bottom: 1px solid oklch(var(--bc) / 0.1) !important;
    }
    
    .layui-table th {
        background-color: oklch(var(--b3)) !important;
        color: oklch(var(--bc) / 0.8) !important;
        font-weight: 600;
        border-color: oklch(var(--bc) / 0.05) !important;
    }
    
    .layui-table th span {
        background-color: transparent !important;
        color: oklch(var(--bc) / 0.8) !important;
    }
    
    .layui-table td {
        border-color: oklch(var(--bc) / 0.05);
        color: oklch(var(--bc));
    }
    
    /* ========================================
       daisyUI 风格表格悬停高亮
       ======================================== */
    
    /* 表格行基础样式 */
    .layui-table tbody tr {
        transition: all 0.15s ease;
    }
    
    /* 悬停高亮效果 - daisyUI hover:bg-base-300 风格 */
    .layui-table-hover,
    .layui-table tbody tr:hover,
    .layui-table-body tr:hover {
        background-color: oklch(var(--b2)) !important; 
    }
    
    .layui-table-hover td,
    .layui-table tbody tr:hover td,
    .layui-table-body tr:hover td {
        background-color: transparent !important;
    }
    
    /* 点击选中状态 */
    .layui-table-click,
    .layui-table-click td {
        background-color: oklch(var(--p) / 0.15) !important;
    }
    
    /* 分页样式修复 */
    .layui-laypage a, .layui-laypage span {
        background-color: transparent !important;
        color: oklch(var(--bc) / 0.7) !important;
        border-color: oklch(var(--bc) / 0.1) !important;
    }
    
    .layui-laypage .layui-laypage-curr .layui-laypage-em {
        background-color: oklch(var(--p)) !important;
    }
    
    .layui-laypage .layui-laypage-curr em {
        color: oklch(var(--pc)) !important;
    }

    /* 分页输入框和下拉框深色适配 */
    .layui-laypage input, .layui-laypage select {
        background-color: oklch(var(--b1)) !important;
        border: 1px solid oklch(var(--bc) / 0.1) !important;
        color: oklch(var(--bc)) !important;
    }
    
    .layui-laypage button {
        background-color: oklch(var(--b1)) !important;
        border: 1px solid oklch(var(--bc) / 0.1) !important;
        color: oklch(var(--bc) / 0.7) !important;
    }

    /* 修复底部空白 */
    html, body { height: 100%; }
    .layui-fluid { 
        padding: 24px; 
        min-height: calc(100vh - 110px); 
        box-sizing: border-box;
    }
    .layui-card { height: 100%; margin-bottom: 0; }
    .layui-card-body { height: calc(100% - 100px); overflow: auto; }

    /* 投递按钮特殊样式 - 修复裁剪问题 */
    .layui-btn-sm {
        height: auto;
        min-height: 28px;
        line-height: 1.4;
        font-size: 12px;
        background: oklch(var(--su) / 0.15);
        color: oklch(var(--su));
        border: 1px solid oklch(var(--su) / 0.3);
        box-shadow: none;
        padding: 4px 12px;
        white-space: nowrap;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
    }
    
    .layui-btn-sm:hover {
        background: oklch(var(--su) / 0.25);
        color: oklch(var(--bc));
    }
    
    .layui-btn-normal {
        background: oklch(var(--n) / 0.15) !important;
        color: oklch(var(--bc) / 0.6) !important;
        border: 1px solid oklch(var(--n) / 0.3) !important;
    }
    
    /* 确保操作列不裁剪 */
    .layui-table-cell {
        overflow: visible;
    }

    /* ========================================
       daisyUI 风格下拉菜单 (select)
       ======================================== */
    
    /* 下拉框容器 */
    .layui-form-select {
        position: relative;
    }
    
    /* 下拉框输入框 - daisyUI select 风格 */
    .layui-form-select .layui-input {
        background-color: oklch(var(--b1));
        border: 1px solid oklch(var(--bc) / 0.15);
        border-radius: 8px;
        color: oklch(var(--bc));
        padding-right: 32px;
        cursor: pointer;
    }
    
    .layui-form-select .layui-input:focus,
    .layui-form-select.layui-form-selected .layui-input {
        border-color: oklch(var(--p));
        box-shadow: 0 0 0 2px oklch(var(--p) / 0.25);
    }
    
    /* 下拉箭头 */
    .layui-form-select .layui-edge {
        border-top-color: oklch(var(--bc) / 0.5);
        right: 12px;
    }
    
    /* 下拉菜单 - daisyUI dropdown 风格 */
    .layui-form-select dl {
        background-color: oklch(var(--b2));
        border: 1px solid oklch(var(--bc) / 0.15);
        border-radius: 8px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        padding: 4px;
        margin-top: 4px;
        max-height: 240px;
        overflow-y: auto;
    }
    
    .layui-form-select dl dd {
        color: oklch(var(--bc) / 0.8);
        padding: 10px 14px;
        border-radius: 6px;
        margin: 2px 0;
        transition: all 0.15s;
    }
    
    .layui-form-select dl dd:hover {
        background-color: oklch(var(--p) / 0.15);
        color: oklch(var(--p));
    }
    
    .layui-form-select dl dd.layui-this {
        background-color: oklch(var(--p));
        color: oklch(var(--pc));
    }

    /* 修复表格 Loading 和空数据样式 */
    .layui-table-init, .layui-none {
        background-color: transparent !important;
        color: oklch(var(--bc) / 0.6) !important;
    }
    
    .layui-table-body {
        overflow-x: auto;
    }
  </style>

  <div class="layui-fluid">
    <div class="layui-card">
      <div class="layui-form layui-card-header layuiadmin-card-header-auto">
          <input type="hidden" id="keyword" autocomplete="off" class="layui-input" value="">
          <input type="hidden" id="price_min" autocomplete="off" class="layui-input" value="">

          </div>
          <div class="layui-inline">
            <button class="layui-btn layuiadmin-btn-list" lay-submit lay-filter="LAY-app-forumlist-search">
              <i class="layui-icon layui-icon-search layuiadmin-button-btn"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="layui-card-body">
          <table id="LAY-app-forum-list" lay-filter="LAY-app-forum-list"></table>
          {% verbatim %}
            <script type="text/html" id="table-forum-list">
               {{#  if(d.send_key == 0){ }}

               {{#  } else { }}

               {{#  } }}
            </script>
          {% endverbatim %}
      </div>
    </div>
  </div>
  </body>
{% endblock %}

{% block js %}
  <script>
  layui.config({
    base: '{% static "layuiadmin/" %}' //静态资源所在路径
  }).extend({
    index: 'lib/index' //主入口模块
  }).use(['index', 'forum', 'table'], function() {
      var $ = layui.$
          , form = layui.form
          , table = layui.table;

      //监听搜索
      form.on('submit(LAY-app-forumlist-search)', function (data) {
          var field = data.field;
          console.log(notNumber(field.price_min))
          console.log(field.price_min == "")
          if(field.price_min != ""){
              if(notNumber(field.price_min)){
                  console.log(field.price_min)
              layer.msg("薪资区间应为数字！");
              return false
              }
          }
          if(field.price_max != ""){
              if(notNumber(field.price_max)){
                  console.log(field.price_max)
              layer.msg("薪资区间应为数字！");
              return false
              }
          }


          //执行重载
          table.reload('LAY-app-forum-list', {
              page:{curr:1},
              where: field
          });
      });
  });

  function notNumber(val) {
    var regPos = /^\d+(\.\d+)?$/; //非负浮点数
    var regNeg = /^(-(([0-9]+\.[0-9]*[1-9][0-9]*)|([0-9]*[1-9][0-9]*\.[0-9]+)|([0-9]*[1-9][0-9]*)))$/; //负浮点数
    if(regPos.test(val) || regNeg.test(val)) {
        return false;
        } else {
        return true;
        }
    }
  </script>
{% endblock %}
